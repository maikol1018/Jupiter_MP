# ============================================================
# Nginx 配置 — api.jupiter-astro.top
# 反向代理到本机 vps-server.js (端口 3000)
#
# 使用方法：
#   sudo cp nginx.conf /etc/nginx/sites-available/api.jupiter-astro.top
#   sudo ln -s /etc/nginx/sites-available/api.jupiter-astro.top \
#              /etc/nginx/sites-enabled/api.jupiter-astro.top
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name api.jupiter-astro.top;

    # Let's Encrypt ACME 验证目录（certbot 自动写入）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.jupiter-astro.top;

    # ── SSL 证书（由 certbot 自动填充） ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.jupiter-astro.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jupiter-astro.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── 安全响应头 ────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # ── 客户端请求体限制（Gemini 提示词可能较大） ─────────────
    client_max_body_size 4m;

    # ── 反向代理到 Node.js ────────────────────────────────────
    # /api/generate：Gemini 流式生成，必须关闭缓冲让 SSE 实时下发
    location = /api/generate {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 关键：禁用缓冲，让上游每一段 SSE 立刻发给小程序
        proxy_buffering          off;
        proxy_request_buffering  off;
        proxy_cache              off;
        chunked_transfer_encoding on;
        gzip                     off;
        proxy_set_header         Connection '';
        proxy_set_header         X-Accel-Buffering no;

        # 留足 Gemini 生成时间 + 心跳裕度
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Gemini 生成可能需要较长时间
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
    }
}
